label: Chèques déjeuner
institution: caf_morbihan
description: >-
  Des chèques déjeuner d'une valeur de 5 € sont proposés aux jeunes de moins de 21 ans et adréssés
  par courrier suivi à partir de la date de réception de la demande à la Caf.
prefix: le
conditions:
  - Être à la charge de ses parents mais possibilité de bénéficier d'une aide au
    logement à titre personnel.
  - Les ressources du jeune (y compris indemnités repas ou trajets) ne doivent
    pas être supérieures à 55 % du SMIC brut sur la base d'un contrat de travail
    à temps plein, hors prestations logement.
  - Remplir le formulaire de demande d'aide et l'envoyer à la Caf du Morbihan - Unité AFI, 70 rue de Sainte Anne - BP 322 - 56018 VANNES Cedex.
conditions_generales:
  - type: age
    operator: "<"
    value: 21
  - type: departements
    values:
