label: Aides au BAFA, BAFD, BSB
institution: ville-de-vannes
description: >-
  La Ville de Vannes apporte une aide financière aux jeunes qui souhaitent
  suivre les formations :

  - Brevet d'Aptitude aux Fonctions d'Animateurs (BAFA)

  - Brevet d'Aptitude aux Fonctions de Directeurs (BAFD)

  - Brevet de Surveillant de Baignade (BSB)

  Pour toute demande, contacter le BIJ (Bureau information jeunesse) au 02 97 01
  61 00 ou bij@mairie-vannes.fr
conditions:
  - Avoir moins de 25 ans révolus
  - Etre domicilié fiscalement à Vannes depuis au moins 1 an
conditions_generales: []
profils: []
link: https://bij-vannes.fr/aides-au-bafa-bafd-bsb
type: bool
periodicite: ponctuelle
