label: Aides alimentaires
institution: ccas-de-saint-louis
description: >-
  Ce dispositif est une mesure d’aide d’urgence spécifique en matière
  d’alimentation en faveur des publics relevant de l’action sociale du CCAS.
  Elle se veut non stigmatisante et responsable. Les bénéficiaires seront
  accompagnés autant que faire se peut, afin d’éviter toute situation de
  précarité durable.

  L’intervention peut prendre trois formes :

  ★ Colis alimentaires dont l'attribution peut s’étaler sur une période de 6
  mois au maximum sous la condition d’un accompagnement social interne au CCAS
  ou de l’un de ses partenaires et d’une décision.

  ★ Une allocation financière directe d’urgence

  ★ Une allocation dans le cadre d’accompagnement social et financier pouvant
  s'étaler sur 12 mois au maximum dont le ressort est celui de la Commission
  permanente.

  ★ Une allocation financière forfaitaire dont la périodicité peut être
  mensuelle, trimestrielle ou semestrielle, destinée à venir en aide aux
  personnes pauvres ou très pauvres pour la prise en charge de frais
  alimentaires du foyer.

  Les familles les plus en difficultés seront aidées à obtenir des aides
  d’autres soutiens existants auprès de leur mutuelle ou d’associations
  caritatives.
conditions:
  - >-
    -Être domicilié sur la commune de Saint-Louis depuis plus de 6 mois  pour
    demandeurs Français ou 1 an de résidence personnelle pour les étrangers en
    séjour régulier.
  - '-Relever de l’action sociale facultative du CCAS de Saint-Louis.'
  - >-
    -Être dans une situation de difficulté alimentaire, ponctuelle ou plus
    durable, justifiant une aide. L’aide vise les personnes qui n’ont plus les
    moyens de s’alimenter convenablement.
  - >-
    -Être une personne seule, une famille monoparentale, un couple sans enfant,
    un couple avec enfant(s), un couple avec personne(s) majeure(s) à charge, ou
    une personne avec personne(s) majeure(s) à charge.
  - >-
    -Relever d’un des groupes ressources ouvrant droit à cette aide : GR1, GR2
    ou GR3.
  - '-Groupes ressources de référence'
  - >-
    GR1 : personnes très pauvres. Ressources jusqu’à 40 % du revenu médian
    communal.
  - 'GR2 : personnes pauvres. Ressources jusqu’à 80 % du revenu médian communal.'
  - >-
    GR3 : travailleurs pauvres et autres personnes pauvres. Ressources jusqu’à
    120 % du revenu médian communal.
  - Le classement dépend du niveau de ressources et de la composition du foyer.
  - '-Repères de ressources 2025'
  - '1 personne : GR1 jusqu’à 509 € ; GR2 jusqu’à 1 018 € ; GR3 jusqu’à 1 527 €.'
  - >-
    2 personnes : GR1 jusqu’à 559,90 € ; GR2 jusqu’à 1 119,80 € ; GR3 jusqu’à 1
    679,70 €.
  - >-
    3 personnes : GR1 jusqu’à 661,70 € ; GR2 jusqu’à 1 323,40 € ; GR3 jusqu’à 1
    985,10 €.
  - >-
    4 personnes : GR1 jusqu’à 712,60 € ; GR2 jusqu’à 1 425,20 € ; GR3 jusqu’à 2
    137,80 €.
  - >-
    5 personnes : GR1 jusqu’à 814,40 € ; GR2 jusqu’à 1 628,80 € ; GR3 jusqu’à 2
    443,20 €.
  - >-
    Une prise en compte spécifique existe pour certaines situations, notamment
    les personnes âgées de plus de 74 ans et les personnes porteuses de
    handicap.
  - >-
    -L’aide du CCAS intervient selon un principe de subsidiarité : les autres
    aides mobilisables doivent avoir été recherchées ou sollicitées en priorité.
    Le règlement précise qu’un diagnostic des droits sociaux de moins de 6 mois
    est obligatoire.
  - '-La demande doit être déposée auprès d’une agence du CCAS.'
  - '-Une enquête sociale préalable est réalisée avant toute admission.'
  - >-
    La demande est instruite par la direction des solidarités, puis soumise soit
    à une personne habilitée, soit à la Commission permanente selon -la nature
    de l’aide.
  - >-
    -Le demandeur doit fournir les justificatifs utiles : Justificatif
    d’identité : copie de la carte d’identité ou du passeport.
  - >-
    Attestation de résidence : facture d’eau ou d’électricité au nom du
    demandeur de – 3 mois
  - >-
    Pour les revenus d’activité salariée : la copie du dernier bulletin de paie
    , Avis d’imposition ou non-imposition
  - >-
    La demande d’aide est faite auprès de l’une des agences du CCAS. Une enquête
    sociale est diligentée au préalable à chaque admission. La direction des
    solidarités instruit celle-ci, émet son avis et soumet la décision, selon le
    cas, à la personne habilitée ou à la Commission permanente.
