label: Aide aux séjours à l'étranger
institution: ville-de-vannes
description: >-
  La Ville de Vannes propose de soutenir financièrement les étudiants post-bac
  afin de suivre des études ou réaliser des stages à l'étranger. 

  L'octroi de l'aide est limité à 1 fois par an sans condition de ressources.

  Le montant de l'aide varie en fonction de la durée (minimum 3 semaines) et de
  la destination du séjour.

  Pour toute demande, prendre contact avec le BIJ (Bureau Information Jeunesse)
  au 02 97 01 61 00 ou bij@mairie-vannes.fr
conditions:
  - Avoir des parents domiciliés fiscalement à Vannes depuis au moins un an.
  - Être inscrit au moins en 1ère année d'un cursus post-bac sanctionné par un
    diplôme reconnu par le Ministère de l'Education Nationale.
  - Justifier soit d'une attestation de l'université d'origine ou d'une
    inscription dans une université à l'étranger pour complément de formation,
    soit d'une attestation ou convention de stage.
