label: épicerie solidaire
institution: ville-de-vannes
prefix: l’
description:
  Lʼépicerie solidaire s’adresse aux ménages qui ont des ressources, rencontrent
  des difficultés financières et sʼinscrivent dans une démarche dʼinsertion. Le
  demandeur doit résider ou bénéficier dʼune domiciliation administrative sur
  Vannes. Aide soumise à un reste à vivre calculé lors de lʼinstruction de la demande.
conditions_generales:
  - type: attached_to_institution
  - type: age
    operator: ">="
    value: 18
conditions:
  - Prendre rendez-vous auprès du CCAS au 02 97 01 65 00 pour toute demande dʼinstruction.
  - Pour les personnes de moins de 25 ans, justifier dʼune autonomie financière et avoir sa
    propre déclaration fiscale.
