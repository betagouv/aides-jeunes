label: Epicerie solidaire
institution: ville-de-vannes
description: >-
  L’épicerie solidaire s’adresse aux ménages qui ont des ressources, rencontrent
  des difficultés financières et s’inscrivent dans une démarche d’insertion. Le
  demandeur doit résider ou bénéficier d’une domiciliation administrative sur
  Vannes.

  Pour toute demande d'instruction, prendre rendez-vous auprès du CCAS au 02 97
  01 65 00.
conditions:
  - Avoir plus de 25 ans
  - >-
    Pour les moins de 25 ans, justifier d'une autonomie financière et avoir sa
    propre déclaration fiscale
  - Aide soumise à un reste à vivre calculé lors de l'instruction de la demande
conditions_generales: []
profils:
  - chomeur
  - professionnalisation
  - salarie
  - independant
  - beneficiaire_rsa
  - parent
  - inactif
  - situation_handicap
link: https://www.mairie-vannes.fr/action-sociale-et-insertion
type: bool
periodicite: autre
