label: Aide au BAFA, BAFD et BSB
prefix: l’
institution: ville-de-vannes
description: >-
  La Ville de Vannes apporte une aide financière aux jeunes qui souhaitent
  suivre lʼune des formations suivantes ":"

  - Brevet dʼAptitude aux Fonctions dʼAnimateurs (BAFA)

  - Brevet dʼAptitude aux Fonctions de Directeurs (BAFD)

  - Brevet de Surveillant de Baignade (BSB)

  Pour demander cette aide, vous devez contacter le BIJ (Bureau information jeunesse) au 02 97 01 61 00 ou bij@mairie-vannes.fr.
