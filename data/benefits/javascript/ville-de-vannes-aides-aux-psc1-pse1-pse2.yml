label: Aides aux PSC1, PSE1, PSE2
institution: ville-de-vannes
description: >-
  La Ville de Vannes apporte une aide financière aux jeunes qui souhaitent
  suivre les formations de secourisme Prévention et Secours Civiques de niveau
  1 (PSC1), Premiers Secours en Equipe niveau 1 (PSE1) ou Premiers Secours en
  Equipe niveau 2 (PSE2). Pour toute demande, contacter le BIJ (Bureau Information
  Jeunesse) au 02 97 01 61 00 ou bij@mairie-vannes.fr.
conditions:
  - Avoir moins de 25 ans révolus
  - Être domicilié fiscalement à Vannes depuis au moins 1 an
conditions_generales:
  - type: communes
    values:
      - "56260"
  - type: age
    operator: "<="
    value: 25
